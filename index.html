<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Tip Calculator</h1>

    <div class="calculator">

        <!-- INPUT SECTION -->
        <div class="input-section">

            <!-- Bill Amount -->
            <div class="field">
                <label for="bill">Bill Amount ($)</label>

                <input
                    type="number"
                    id="bill"
                    min="0"
                    step="0.01"
                    placeholder="Enter bill amount">

                <small class="error" id="billError"></small>
            </div>

            <!-- Tip Buttons -->
            <div class="field">
                <label>Select Tip</label>

                <div class="tip-buttons">

                    <button class="tip-btn active" data-tip="10">
                        10%
                    </button>

                    <button class="tip-btn" data-tip="15">
                        15%
                    </button>

                    <button class="tip-btn" data-tip="20">
                        20%
                    </button>

                </div>
            </div>

            <!-- Custom Tip -->
            <div class="field">

                <label for="customTip">
                    Custom Tip (%)
                </label>

                <input
                    type="number"
                    id="customTip"
                    min="0"
                    max="100"
                    placeholder="Custom Tip">

                <small class="error" id="tipError"></small>

            </div>

            <!-- Number of People -->
            <div class="field">

                <label for="people">
                    Number of People
                </label>

                <input
                    type="number"
                    id="people"
                    min="1"
                    placeholder="People">

                <small class="error" id="peopleError"></small>

            </div>

            <!-- Reset -->
            <button id="resetBtn" class="reset-btn">
                Reset
            </button>

        </div>

        <!-- RESULT SECTION -->

        <div class="result-section">

            <div class="result-card">
                <span>Tip Amount</span>
                <h2 id="tipAmount">$0.00</h2>
            </div>

            <div class="result-card">
                <span>Grand Total</span>
                <h2 id="grandTotal">$0.00</h2>
            </div>

            <div class="result-card">
                <span>Per Person</span>
                <h2 id="perPerson">$0.00</h2>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
